name: Frontend Validation

on:
  pull_request:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  frontend-check:
    name: Validate Frontend Files
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      
      - name: Check HTML syntax
        run: |
          # Install HTML validator
          sudo apt-get update
          sudo apt-get install -y tidy
          
          # Validate HTML files
          find v-1.0-python/my-react-app -name "*.html" -exec tidy -q -e {} \; || true